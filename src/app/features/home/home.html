<div class="w-screen h-screen flex"
     style="background: #0d1a0f;">

  <div class="absolute inset-0 pointer-events-none">
    <div style="position:absolute; top:-10%; left:-5%; width:400px; height:400px; border-radius:50%;
                    background: radial-gradient(circle, rgba(74,124,50,0.12), transparent 70%);
                    filter: blur(40px);"></div>
    <div style="position:absolute; bottom:-10%; right:-5%; width:500px; height:500px; border-radius:50%;
                    background: radial-gradient(circle, rgba(109,191,74,0.08), transparent 70%);
                    filter: blur(50px);"></div>
    <div style="position:absolute; top:40%; left:40%; width:300px; height:300px; border-radius:50%;
                    background: radial-gradient(circle, rgba(212,136,30,0.05), transparent 70%);
                    filter: blur(40px);"></div>
  </div>

  @if (userData()?.role === 'client') {
    <div>Replace with the client portal root component</div>
  }

  @if (userData()?.role === 'deliverer') {
    <div>Replace with the deliverer portal root component</div>
  }

  @if (userData()?.role === 'restaurant') {
    <div class="w-full h-full flex flex-col relative overflow-hidden">

      <div class="h-[7%] w-full relative z-10">
        <app-restaurant-navigation/>
      </div>
      <router-outlet />
    </div>
  }
</div>
