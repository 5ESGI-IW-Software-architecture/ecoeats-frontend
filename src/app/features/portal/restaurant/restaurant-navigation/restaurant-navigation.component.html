<nav class="h-full w-full"
     style="background: rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);">

  <div class="px-40 mx-auto h-full flex items-center justify-between ">

  <div class="flex items-center gap-3">
    <div class="flex items-center justify-center w-9 h-9 rounded-xl"
         style="background: linear-gradient(135deg, rgba(74,124,50,0.2), rgba(109,191,74,0.1));
                border: 1px solid rgba(109,191,74,0.25);">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="1.5" stroke="#6dbf4a" style="width:18px;height:18px;">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M13.5 21v-7.5a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349M3.75 21V9.349m0 0a3.001 3.001 0 0 0 3.75-.615A2.993 2.993 0 0 0 9.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 0 0 2.25 1.016c.896 0 1.7-.393 2.25-1.015a3.001 3.001 0 0 0 3.75.614m-16.5 0a3.004 3.004 0 0 1-.621-4.72l1.189-1.19A1.5 1.5 0 0 1 5.378 3h13.243a1.5 1.5 0 0 1 1.06.44l1.19 1.189a3 3 0 0 1-.621 4.72M6.75 18h3.75a.75.75 0 0 0 .75-.75V13.5a.75.75 0 0 0-.75-.75H6.75a.75.75 0 0 0-.75.75v3.75c0 .414.336.75.75.75Z" />
      </svg>
    </div>
    <div class="flex flex-col">
      <span class="text-xs font-black tracking-tight"
            style="font-family: 'Playfair Display', Georgia, serif; color: #6dbf4a;">
        eco<span style="color: #fff;">eats</span>
      </span>
      <span class="text-xs font-semibold text-white truncate max-w-35"
            style="font-family: 'DM Sans', sans-serif;">
        {{ userData()?.restaurantName }}
      </span>
    </div>
  </div>

  <div class="flex items-center gap-1">

    <button
      routerLink="/restaurant/incoming-orders"
      routerLinkActive="nav-active"
      type="button"
      class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold transition-all duration-250"
      style="font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; border: none; cursor: pointer;
                   background: transparent; color: rgba(255,255,255,0.55);">
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="2" stroke="currentColor" style="width:15px;height:15px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
      </svg>
      Incoming Orders
    </button>

    <button
      routerLink="/restaurant/active-orders"
      routerLinkActive="nav-active"
      type="button"
            class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold transition-all duration-250"
            style="font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; border: none; cursor: pointer;
                   background: transparent; color: rgba(255,255,255,0.55);">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="2" stroke="currentColor" style="width:15px;height:15px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 0-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
      </svg>
      Active Orders
    </button>

    <button
      routerLink="/restaurant/menu"
      routerLinkActive="nav-active"
      type="button"
            class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold transition-all duration-250"
            style="font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; border: none; cursor: pointer;
                   background: transparent; color: rgba(255,255,255,0.55);">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="2" stroke="currentColor" style="width:15px;height:15px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" />
      </svg>
      Menu
    </button>

    <button
      routerLink="/restaurant/profile"
      routerLinkActive="nav-active"
      type="button"
            class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold transition-all duration-250"
            style="font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; border: none; cursor: pointer;
                   background: transparent; color: rgba(255,255,255,0.55);">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="2" stroke="currentColor" style="width:15px;height:15px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
      </svg>
      Profile
    </button>

    <div class="w-px h-5 mx-2" style="background: rgba(255,255,255,0.1);"></div>

    <button
      (click)="handleLogout()"
      type="button"
            class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold transition-all duration-250"
            style="font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; border: none; cursor: pointer;
                   background: rgba(239,68,68,0.08); color: rgba(239,68,68,0.85);
                   border: 1px solid rgba(239,68,68,0.2);">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
           stroke-width="2" stroke="currentColor" style="width:15px;height:15px;flex-shrink:0;">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
      </svg>
      Logout
    </button>
  </div>

  </div>
</nav>
